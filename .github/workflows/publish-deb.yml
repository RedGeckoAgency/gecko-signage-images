name: Publish .deb to APT Repo

on:
  push:
    tags:
      - "agent-v*.*.*"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version (leave empty to read from version.py)"
        required: false

permissions:
  contents: read

concurrency:
  group: publish-deb
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build .deb & Publish to APT Repo
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Init gecko submodule
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          ssh-agent -a "$SSH_AUTH_SOCK" > /dev/null
          ssh-add - <<< "${{ secrets.GECKO_DEPLOY_KEY }}"
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git submodule update --init --recursive gecko

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION=$(python3 -c "
          import re, sys
          m = re.search(r'AGENT_VERSION\s*=\"([^\"]+)\"', open('gecko/agent_core/version.py').read())
          print(m.group(1) if m else sys.exit(1))
          ")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "deb_version=${VERSION}-1" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Install build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils gnupg2

      # ── Build .deb for armhf ──
      - name: Build .deb (armhf)
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh --arch armhf --out out/deb

      # ── Build .deb for arm64 ──
      - name: Build .deb (arm64)
        run: |
          ./scripts/build-deb.sh --arch arm64 --out out/deb

      - name: List built packages
        run: ls -lh out/deb/

      # ── Import GPG key ──
      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          # Trust the key
          KEY_ID=$(gpg --list-keys --with-colons "Gecko APT Repo" | grep fpr | head -1 | cut -d: -f10)
          echo "${KEY_ID}:6:" | gpg --import-ownertrust

      # ── Build APT repository index ──
      - name: Download existing pool from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        run: |
          mkdir -p repo/pool/main/g/gecko-agent
          mkdir -p repo/dists/stable/main/binary-armhf
          mkdir -p repo/dists/stable/main/binary-arm64
          # Download existing packages (so the repo has all versions)
          aws s3 sync "s3://${{ secrets.APT_REPO_BUCKET }}/pool/" repo/pool/ --quiet || true

      - name: Copy new .deb into pool
        run: |
          cp out/deb/gecko-agent_*.deb repo/pool/main/g/gecko-agent/

      - name: Generate Packages index
        run: |
          cd repo
          # armhf
          dpkg-scanpackages --arch armhf pool/ > dists/stable/main/binary-armhf/Packages
          gzip -9c dists/stable/main/binary-armhf/Packages > dists/stable/main/binary-armhf/Packages.gz
          # arm64
          dpkg-scanpackages --arch arm64 pool/ > dists/stable/main/binary-arm64/Packages
          gzip -9c dists/stable/main/binary-arm64/Packages > dists/stable/main/binary-arm64/Packages.gz

      - name: Generate & sign Release file
        run: |
          cd repo/dists/stable

          # Create Release file
          cat > Release <<EOF
          Origin: Gecko Signage
          Label: Gecko Signage APT Repository
          Suite: stable
          Codename: stable
          Architectures: armhf arm64
          Components: main
          Description: Private APT repository for Gecko Signage Agent
          Date: $(date -Ru)
          EOF

          # Add hashes
          apt-ftparchive release . >> Release

          # Sign: detached signature
          gpg --batch --yes --armor --detach-sign --output Release.gpg Release

          # Sign: inline signature (InRelease)
          gpg --batch --yes --armor --clearsign --output InRelease Release

      # ── Upload to S3 ──
      - name: Sync repository to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        run: |
          # Upload pool (packages) — keep old versions
          aws s3 sync repo/pool/ "s3://${{ secrets.APT_REPO_BUCKET }}/pool/" --quiet

          # Upload dists (index + signatures) — overwrite
          aws s3 sync repo/dists/ "s3://${{ secrets.APT_REPO_BUCKET }}/dists/" --delete --quiet

          echo "Published gecko-agent ${{ steps.version.outputs.version }} to APT repo"

      # ── Invalidate CloudFront cache ──
      - name: Invalidate CloudFront cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/dists/*" "/pool/main/g/gecko-agent/*"

      # ── Upload .deb as workflow artifact ──
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gecko-agent-debs-${{ steps.version.outputs.version }}
          path: out/deb/*.deb
          retention-days: 30
